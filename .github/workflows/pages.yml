name: Build and deploy site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create output directories
        run: mkdir -p assets/cv/ assets/slides/

      - name: Cache compiled CV
        uses: actions/cache@v6
        id: cv-cache
        with:
          path: assets/cv/cv.pdf
          key: cv-${{ hashFiles('_cv/**') }}

      - name: Cache compiled slides
        uses: actions/cache@v6
        id: slides-cache
        with:
          path: assets/slides/
          key: slides-${{ hashFiles('_slides/**') }}
          restore-keys: slides-

      - name: Install TeXLive
        if: steps.cv-cache.outputs.cache-hit != 'true' || steps.slides-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-science \
            texlive-luatex

      - name: Compile CV
        if: steps.cv-cache.outputs.cache-hit != 'true'
        run: |
          make -C _cv/
          cp _cv/cv.pdf assets/cv/cv.pdf

      - name: Expose CV source code
        run: cp _cv/cv.tex assets/cv/cv.tex

      - name: Compile slides
        if: steps.slides-cache.outputs.cache-hit != 'true'
        run: |
          touch assets/slides/.hashes

          for dir in _slides/*/; do
            name=$(basename "${dir}")
            current_hash=$(tar -cf - --sort=name -C _slides/ "${name}" | sha256sum)
            current_hash="${current_hash%% *}"
            stored_hash=$(sed -n "s/^${name} //p" assets/slides/.hashes)

            if [ "${current_hash}" != "${stored_hash}" ]; then
              echo "Compiling '${name}' (hash changed)"
              make -C "_slides/${name}/"
              cp "_slides/${name}/${name}.pdf" "assets/slides/${name}.pdf"
              rm -f "assets/slides/${name}.tar.gz"
              sed -i "/^${name} /d" assets/slides/.hashes
              echo "${name} ${current_hash}" >> assets/slides/.hashes
            else
              echo "Skipping '${name}' (unchanged)"
            fi
          done

      - name: Create and expose tarballs of slides
        if: steps.slides-cache.outputs.cache-hit != 'true'
        run: |
          for dir in _slides/*/; do
            name=$(basename "${dir}")
            if [ ! -f "assets/slides/${name}.tar.gz" ]; then
              make -C "_slides/${name}/" clean
              tar -czf "assets/slides/${name}.tar.gz" -C _slides/ "${name}"
            fi
          done

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site/

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
